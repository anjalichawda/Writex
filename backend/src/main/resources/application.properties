server.port=8000

# Allow larger cover uploads (default multipart limits are often too small)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== LLM (free Hugging Face Inference API) =====
# Set HF_API_TOKEN environment variable (free-tier) to enable AI generation.
ai.llm.hf.token=${HF_API_TOKEN:}
# Default public model (no private access required)
ai.llm.hf.baseUrl=https://router.huggingface.co/v1
# Pick ONE of these ? all are free-tier with fast providers:
ai.llm.hf.model=meta-llama/Llama-3.1-8B-Instruct:cerebras
# ai.llm.hf.model=Qwen/Qwen2.5-7B-Instruct:sambanova
# ai.llm.hf.model=meta-llama/Llama-3.2-3B-Instruct:cerebras
# Hugging Face image inference endpoint + default text-to-image model
ai.image.hf.baseUrl=https://router.huggingface.co/hf-inference/models
ai.image.hf.model=stabilityai/stable-diffusion-xl-base-1.0

spring.datasource.url=jdbc:mysql://localhost:3306/WriteX
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true